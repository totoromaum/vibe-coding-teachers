<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 상담 신청 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f4f8; }
        .glass-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }
        .left-panel {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        input, select, textarea {
            background-color: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2563eb !important;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-4xl flex flex-col md:flex-row">
        <!-- 왼쪽 정보 패널 -->
        <div class="left-panel md:w-2/5 p-8 md:p-12 text-white flex flex-col justify-between">
            <div>
                <h1 class="text-3xl font-bold mb-6">교사 상담 신청</h1>
                <p class="text-blue-100 leading-relaxed mb-10">
                    교육 과정, 협력 수업, 행정 업무 등 공유하고 싶은 내용이나 상담이 필요한 사항이 있다면 언제든 편하게 메시지를 남겨주세요.
                </p>

                <div class="space-y-6">
                    <div class="flex items-center space-x-4">
                        <div class="bg-blue-500/30 p-3 rounded-full">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <span>1층 교무실</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="bg-blue-500/30 p-3 rounded-full">
                            <i class="far fa-clock"></i>
                        </div>
                        <span>공강 시간 및 퇴근 전 방문 환영</span>
                    </div>
                </div>
            </div>

            <div class="mt-12 flex space-x-4 opacity-50">
                <i class="fab fa-python text-2xl"></i>
                <i class="fab fa-html5 text-2xl"></i>
            </div>
        </div>

        <!-- 오른쪽 입력 폼 -->
        <div class="md:w-3/5 p-8 md:p-12 bg-white">
            <form id="consultationForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">소속 학교</label>
                        <input type="text" name="school" placeholder="예: 오션중학교" required
                            class="w-full px-4 py-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">성함</label>
                        <input type="text" name="name" placeholder="김교사" required
                            class="w-full px-4 py-3 rounded-xl">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">담당 과목</label>
                    <input type="text" name="subject" placeholder="예: 정보/컴퓨터" required
                        class="w-full px-4 py-3 rounded-xl">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">상담 구분</label>
                    <select name="type" class="w-full px-4 py-3 rounded-xl appearance-none">
                        <option value="교과 협의">교과 협의</option>
                        <option value="생활 지도 공유">생활 지도 공유</option>
                        <option value="에듀테크 활용">에듀테크 활용</option>
                        <option value="기타 상담" selected>기타 상담</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">상담 내용</label>
                    <textarea name="content" rows="4" placeholder="궁금한 내용이나 의논하고 싶은 내용을 자유롭게 적어주세요." required
                        class="w-full px-4 py-3 rounded-xl resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-xl hover:bg-black transition-colors flex items-center justify-center space-x-2">
                    <span>메시지 보내기</span>
                </button>
            </form>
            
            <!-- 로딩 및 결과 메시지 -->
            <div id="statusMessage" class="hidden mt-4 p-4 rounded-xl text-center font-medium"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('consultationForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');
        const REDIRECT_URL = "https://script.google.com/macros/s/AKfycbVpldAkyzOrPVwa9yDx1NAaSLLQ9t6T_y2J6i0WUz1owXxI6OW7Wp9n1o4oKm_PmY/exec";

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI 상태 변경 (로딩 중)
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> <span>전송 중...</span>';
            statusMsg.className = "mt-4 p-4 rounded-xl text-center font-medium bg-gray-100 text-gray-600";
            statusMsg.textContent = "상담 내용을 저장하고 있습니다.";
            statusMsg.classList.remove('hidden');

            // 폼 데이터 객체화
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // google.script.run을 사용하여 서버 측 함수 직접 호출
            google.script.run
                .withSuccessHandler(() => {
                    statusMsg.className = "mt-4 p-4 rounded-xl text-center font-medium bg-green-100 text-green-700";
                    statusMsg.textContent = "성공적으로 접수되었습니다. 곧 페이지가 이동합니다.";
                    
                    // 지정된 URL로 리다이렉트
                    setTimeout(() => {
                        window.top.location.href = REDIRECT_URL;
                    }, 1000);
                })
                .withFailureHandler((err) => {
                    statusMsg.className = "mt-4 p-4 rounded-xl text-center font-medium bg-red-100 text-red-700";
                    statusMsg.textContent = "오류가 발생했습니다: " + err;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>메시지 보내기</span>';
                })
                .processForm(data); // 서버 측 processForm 함수 호출
        });
    </script>
</body>
</html>
